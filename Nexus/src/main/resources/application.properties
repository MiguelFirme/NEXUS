spring.application.name=Nexus
server.port=${SERVER_PORT:8080}

# Banco: em Docker use SPRING_DATASOURCE_*; local usa os valores abaixo
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nexus}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT (opcional: use variável de ambiente em produção)
nexus.jwt.secret=${NEXUS_JWT_SECRET:nexus-secret-key-minimo-32-caracteres-para-hs256}
nexus.jwt.expiration-ms=${NEXUS_JWT_EXPIRATION_MS:86400000}
